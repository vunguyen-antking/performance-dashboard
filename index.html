<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Dashboard Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #f0f2f5;
    margin: 0;
    padding: 30px 40px;
    color: #333;
}
h1.page-title {
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 24px 0;
}

/* --- Section cards --- */
.section-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    padding: 24px 28px;
    margin-bottom: 24px;
}
.section-card h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 18px 0;
    color: #222;
}

/* --- Top section: reporter + import side by side --- */
.top-section {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 24px;
}
.top-section > .section-card {
    flex: 1;
    min-width: 320px;
    margin-bottom: 0;
}

/* --- Reporter card --- */
.reporter-layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
}
.avatar-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
}
.avatar-preview {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #e0e0e0;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.2s;
}
.avatar-preview:hover {
    border-color: #4a90d9;
}
.avatar-preview.has-image {
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center center;
    cursor: grab;
}
.avatar-preview.has-image:active {
    cursor: grabbing;
}
.avatar-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.avatar-preview .placeholder {
    font-size: 48px;
    color: #ccc;
}
.avatar-col .avatar-label {
    margin-top: 8px;
    font-size: 13px;
    color: #4a90d9;
    cursor: pointer;
}
.avatar-col .avatar-label:hover {
    text-decoration: underline;
}
.avatar-col input[type="file"] {
    display: none;
}
.reporter-fields {
    flex: 1;
    display: flex;
    flex-direction: column;
}
.reporter-fields input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
}
.reporter-fields input:focus {
    border-color: #4a90d9;
}

/* --- Import zone --- */
.import-zone {
    border: 2px dashed #ccc;
    border-radius: 12px;
    padding: 30px 20px;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
}
.import-zone:hover,
.import-zone.dragover {
    border-color: #4a90d9;
    background: #f0f6ff;
}
.import-zone input[type="file"] {
    display: none;
}
.import-zone .import-icon {
    font-size: 40px;
    color: #aaa;
    margin-bottom: 8px;
}
.import-zone.dragover .import-icon {
    color: #4a90d9;
}
.import-zone p {
    margin: 4px 0;
    font-size: 14px;
    color: #888;
}
.import-zone .browse-link {
    color: #4a90d9;
    font-weight: 600;
    text-decoration: underline;
    cursor: pointer;
}
.import-zone .file-name {
    margin-top: 10px;
    font-size: 13px;
    color: #333;
    font-weight: 600;
}
.import-btn {
    display: inline-block;
    margin-top: 12px;
    padding: 8px 28px;
    background: #2c6ecf;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}
.import-btn:hover {
    background: #1d5ab8;
}

/* --- Table --- */
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px 12px;
    text-align: center;
    border-bottom: 1px solid #eee;
}
th {
    background: #f7f8fa;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}
td {
    border-bottom: 1px solid #f0f0f0;
}
table input[type="text"],
table input[type="number"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}
table input[type="text"]:focus,
table input[type="number"]:focus {
    border-color: #4a90d9;
}
table select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    background: #fff;
    outline: none;
    cursor: pointer;
}
table select:focus {
    border-color: #4a90d9;
}
table input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
}
.delete-row-btn {
    background: none;
    border: none;
    color: #cc0000;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
    line-height: 1;
}
.delete-row-btn:hover {
    background: #fee;
}
#inputTableBody tr.warning-row {
    background: #fff8e1;
}
#inputTableBody tr.warning-row td {
    border-bottom-color: #f5e6a3;
}

/* --- Action buttons --- */
.actions-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    flex-wrap: wrap;
    gap: 8px;
}
.actions-bar .right-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
}
.btn-primary {
    background: #2c6ecf;
    color: #fff;
}
.btn-primary:hover {
    background: #1d5ab8;
    box-shadow: 0 2px 8px rgba(44,110,207,0.3);
}
.btn-secondary {
    background: #e8ecf1;
    color: #333;
}
.btn-secondary:hover {
    background: #dce1e8;
}

/* --- Report section --- */
#reportSection { margin-top: 24px; }
.report-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
}
.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid #e0e0e0;
    background-size: cover;
    background-repeat: no-repeat;
    flex-shrink: 0;
}
.dashboard {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 30px;
}
.dashboard .card {
    flex: 1 1 calc(25% - 15px);
    min-width: calc(50% - 10px);
}
/* Report table alignment */
.report-table th,
.report-table td {
    text-align: left;
    padding: 10px 12px;
}
.report-table .col-status {
    text-align: center;
}
.report-table .col-number {
    text-align: right;
}
#inputTable th.sortable {
    cursor: pointer;
    user-select: none;
    position: relative;
    padding-right: 20px;
}
#inputTable th.sortable:hover {
    background: #ebedf0;
}
#inputTable th.sortable::after {
    content: '⇅';
    position: absolute;
    right: 4px;
    font-size: 11px;
    color: #aaa;
}
#inputTable th.sortable.asc::after {
    content: '▲';
    color: #2c6ecf;
}
#inputTable th.sortable.desc::after {
    content: '▼';
    color: #2c6ecf;
}
#inputTable tfoot td {
    border-top: 2px solid #ddd;
    font-size: 14px;
}
.report-table tfoot td {
    border-top: 2px solid #ddd;
    font-weight: 700;
    font-size: 14px;
}
.report-table th.sortable {
    cursor: pointer;
    user-select: none;
    position: relative;
    padding-right: 20px;
}
.report-table th.sortable:hover {
    background: #ebedf0;
}
.report-table th.sortable::after {
    content: '⇅';
    position: absolute;
    right: 4px;
    font-size: 11px;
    color: #aaa;
}
.report-table th.sortable.asc::after {
    content: '▲';
    color: #2c6ecf;
}
.report-table th.sortable.desc::after {
    content: '▼';
    color: #2c6ecf;
}
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border: 1px solid #e8e8e8;
}
.card h2 { margin-top: 0; font-size: 18px; color: #333; }
.metric { font-size: 36px; font-weight: bold; margin: 10px 0; }
.description { font-size: 14px; color: #666; }
.good { color: #22a553; }
.warning { color: #e6a817; }
.bad { color: #dc3545; }

/* --- Responsive --- */
@media (max-width: 768px) {
    body { padding: 16px; }
    .top-section { flex-direction: column; }
    .top-section > .section-card { min-width: unset; }
    .reporter-layout { flex-direction: column; align-items: center; }
    .reporter-fields { width: 100%; }
    .dashboard { grid-template-columns: 1fr; }
    .actions-bar { flex-direction: column; align-items: stretch; }
    .actions-bar .right-actions { justify-content: stretch; }
    .actions-bar .btn { width: 100%; }
}
</style>
</head>
<body>

<h1 class="page-title">Performance Dashboard Generator</h1>

<div class="top-section">
    <div class="section-card">
        <h2>Reporter Information</h2>
        <div class="reporter-layout">
            <div class="avatar-col">
                <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('reporterAvatar').click()">
                    <span class="placeholder">&#128100;</span>
                </div>
                <span class="avatar-label" onclick="document.getElementById('reporterAvatar').click()">Choose photo</span>
                <input type="file" id="reporterAvatar" accept="image/*">
            </div>
            <div class="reporter-fields">
                <input type="text" id="reporterName" placeholder="Full Name">
                <input type="text" id="reporterPosition" placeholder="Position / Role">
                <input type="date" id="reportDate">
            </div>
        </div>
    </div>
    <div class="section-card">
        <h2>Import Data</h2>
        <div class="import-zone" id="importZone">
            <div class="import-icon">&#128196;</div>
            <p>Drag & drop your file here</p>
            <p>or <span class="browse-link" id="browseLink">browse</span></p>
            <p style="font-size:12px; color:#aaa;">Supports CSV, XLS, XLSX</p>
            <input type="file" id="importFile" accept=".csv,.xlsx,.xls">
            <div class="file-name" id="fileName"></div>
            <button class="import-btn" onclick="importFile()" style="display:none" id="importBtn">Import</button>
        </div>
    </div>
</div>

<div class="section-card">
    <h2>Input Tasks</h2>
    <table id="inputTable">
    <thead>
    <tr>
        <th class="sortable" data-col="0" data-type="string" onclick="sortInputTable(this)">Project</th>
        <th class="sortable" data-col="1" data-type="string" onclick="sortInputTable(this)">Task</th>
        <th class="sortable" data-col="2" data-type="string" onclick="sortInputTable(this)">Status</th>
        <th class="sortable" data-col="3" data-type="number" onclick="sortInputTable(this)">Late (h)</th>
        <th class="sortable" data-col="4" data-type="number" onclick="sortInputTable(this)">Est. (h)</th>
        <th class="sortable" data-col="5" data-type="number" onclick="sortInputTable(this)">Act. (h)</th>
        <th>Reopen</th>
        <th></th>
    </tr>
    </thead>
    <tbody id="inputTableBody"></tbody>
    <tfoot>
    <tr id="inputTableFooter" style="font-weight:700; background:#f7f8fa;">
        <td colspan="3" style="text-align:right;">Total</td>
        <td><span id="totalLate">0</span></td>
        <td><span id="totalEst">0</span></td>
        <td><span id="totalAct">0</span></td>
        <td colspan="2"></td>
    </tr>
    </tfoot>
    </table>

    <div class="actions-bar">
        <button class="btn btn-secondary" onclick="addRow()">Add Task</button>
        <div class="right-actions">
            <button class="btn btn-primary" onclick="generateReport()">Generate Report</button>
            <button class="btn btn-primary" onclick="exportPDF()">Export PDF</button>
            <button class="btn btn-primary" onclick="exportExcel()">Export Excel</button>
        </div>
    </div>
</div>

<div id="reportSection"></div>

<script>
let avatarBase64 = '';
let avatarPos = { x: 50, y: 50 }; // background-position in %

document.getElementById('reporterAvatar').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            avatarBase64 = e.target.result;
            avatarPos = { x: 50, y: 50 };
            const preview = document.getElementById('avatarPreview');
            preview.innerHTML = '';
            preview.classList.add('has-image');
            preview.style.backgroundImage = `url(${avatarBase64})`;
            preview.style.backgroundPosition = `${avatarPos.x}% ${avatarPos.y}%`;
            preview.onclick = null; // disable file picker on click when dragging
        }
        reader.readAsDataURL(file);
    }
});

// Avatar drag to reposition
(function() {
    const preview = document.getElementById('avatarPreview');
    let dragging = false;
    let startX, startY, startPosX, startPosY;

    preview.addEventListener('mousedown', function(e) {
        if (!preview.classList.contains('has-image')) return;
        e.preventDefault();
        dragging = true;
        startX = e.clientX;
        startY = e.clientY;
        startPosX = avatarPos.x;
        startPosY = avatarPos.y;
    });

    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        // Move ~0.5% per pixel dragged
        avatarPos.x = Math.max(0, Math.min(100, startPosX - dx * 0.5));
        avatarPos.y = Math.max(0, Math.min(100, startPosY - dy * 0.5));
        preview.style.backgroundPosition = `${avatarPos.x}% ${avatarPos.y}%`;
    });

    document.addEventListener('mouseup', function() {
        if (dragging) dragging = false;
    });

    // Touch support
    preview.addEventListener('touchstart', function(e) {
        if (!preview.classList.contains('has-image')) return;
        const t = e.touches[0];
        dragging = true;
        startX = t.clientX;
        startY = t.clientY;
        startPosX = avatarPos.x;
        startPosY = avatarPos.y;
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        const t = e.touches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        avatarPos.x = Math.max(0, Math.min(100, startPosX - dx * 0.5));
        avatarPos.y = Math.max(0, Math.min(100, startPosY - dy * 0.5));
        preview.style.backgroundPosition = `${avatarPos.x}% ${avatarPos.y}%`;
    }, { passive: true });

    document.addEventListener('touchend', function() {
        if (dragging) dragging = false;
    });

    // Click to change photo only via label, not by dragging
    preview.addEventListener('click', function(e) {
        if (!preview.classList.contains('has-image')) {
            document.getElementById('reporterAvatar').click();
        }
    });
})();

// Import zone: drag & drop + browse
const importZone = document.getElementById('importZone');
const importInput = document.getElementById('importFile');
const fileNameEl = document.getElementById('fileName');
const importBtn = document.getElementById('importBtn');

document.getElementById('browseLink').addEventListener('click', () => importInput.click());

importInput.addEventListener('change', function() {
    if (this.files[0]) {
        fileNameEl.textContent = this.files[0].name;
        importBtn.style.display = 'inline-block';
    }
});

importZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    this.classList.add('dragover');
});
importZone.addEventListener('dragleave', function() {
    this.classList.remove('dragover');
});
importZone.addEventListener('drop', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
        importInput.files = e.dataTransfer.files;
        fileNameEl.textContent = file.name;
        importBtn.style.display = 'inline-block';
    }
});

function addRow(project='', task='', status='Completed', lateHrs=0, est='', act='', reopen=false) {
    const tbody = document.getElementById('inputTableBody');
    const row = tbody.insertRow();
    row.innerHTML = `
        <td><input type="text" value="${project}"></td>
        <td><input type="text" value="${task}" oninput="updateInputTotals()"></td>
        <td>
            <select>
                <option ${status === 'Completed' ? 'selected' : ''}>Completed</option>
                <option ${status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                <option ${status === 'To Do' ? 'selected' : ''}>To Do</option>
            </select>
        </td>
        <td><input type="number" value="${lateHrs}" min="0" onchange="updateInputTotals()" oninput="updateInputTotals()"></td>
        <td><input type="number" value="${est}" onchange="updateInputTotals()" oninput="updateInputTotals()"></td>
        <td><input type="number" value="${act}" onchange="updateInputTotals()" oninput="updateInputTotals()"></td>
        <td><input type="checkbox" ${reopen ? 'checked' : ''}></td>
        <td><button class="delete-row-btn" onclick="this.closest('tr').remove(); updateInputTotals();">&times;</button></td>
    `;
    updateInputTotals();
}

function updateInputTotals() {
    const rows = document.querySelectorAll('#inputTableBody tr');
    let totalLate = 0, totalEst = 0, totalAct = 0;
    rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const task = inputs[1].value.trim();
        const est = parseFloat(inputs[3].value) || 0;
        totalLate += parseFloat(inputs[2].value) || 0;
        totalEst += est;
        totalAct += parseFloat(inputs[4].value) || 0;
        // Highlight row if task is not empty and Est = 0
        if (task !== '' && est === 0) {
            row.classList.add('warning-row');
        } else {
            row.classList.remove('warning-row');
        }
    });
    document.getElementById('totalLate').textContent = totalLate;
    document.getElementById('totalEst').textContent = totalEst;
    document.getElementById('totalAct').textContent = totalAct;
}

function generateReport() {
    const name = document.getElementById('reporterName').value || 'N/A';
    const position = document.getElementById('reporterPosition').value || 'N/A';
    const reportDateVal = document.getElementById('reportDate').value;
    const reportDateDisplay = reportDateVal
        ? new Date(reportDateVal).toLocaleDateString('en-GB')
        : new Date().toLocaleDateString('en-GB');

    const rows = document.querySelectorAll('#inputTableBody tr');
    let totalEstimated = 0;
    let totalActual = 0;
    let totalLateHrs = 0;
    let totalTasks = 0;
    let completed = 0;
    let overdue = 0;
    let reopenCount = 0;
    let tableRows = '';

    rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const select = row.querySelector('select');
        const project = inputs[0].value;
        const task = inputs[1].value;
        const status = select.value;
        const lateHrs = parseFloat(inputs[2].value) || 0;
        const est = parseFloat(inputs[3].value) || 0;
        const act = parseFloat(inputs[4].value) || 0;
        const isReopen = inputs[5].checked;

        if(task.trim() !== '') {
            totalTasks++;
            if(status === 'Completed') completed++;
            if(lateHrs > 0) overdue++;
            if(isReopen) reopenCount++;
            totalEstimated += est;
            totalActual += act;
            totalLateHrs += lateHrs;
            tableRows += `<tr><td>${project}</td><td>${task}</td><td class="col-status">${status}</td><td class="col-number">${lateHrs}</td><td class="col-number">${est}</td><td class="col-number">${act}</td><td class="col-status">${isReopen ? 'Yes' : 'No'}</td></tr>`;
        }
    });

    const reopenRate = totalTasks > 0 ? ((reopenCount / totalTasks) * 100).toFixed(0) : 0;
    const accuracy = totalEstimated > 0 ? (100 - (Math.abs(totalActual - totalEstimated)/totalEstimated*100)).toFixed(0) : 0;

    document.getElementById('reportSection').innerHTML = `
    <div id="pdfContent" style="padding: 10px 0px 10px 0px;">
        <h1>${name !== 'N/A' ? name + ' — ' : ''}Performance Report — ${reportDateDisplay}</h1>

        <div class="report-header">
            ${avatarBase64 ? `<div class="avatar" style="background-image:url(${avatarBase64});background-position:${avatarPos.x}% ${avatarPos.y}%"></div>` : ''}
            <div>
                <strong>Name:</strong> ${name}<br>
                <strong>Position:</strong> ${position}
            </div>
        </div>

        <div class="dashboard">
            <div class="card">
                <h2>My Completed Issues</h2>
                <div class="metric good">${completed}</div>
                <div class="description">${completed} of ${totalTasks} tasks completed.</div>
            </div>

            <div class="card">
                <h2>My Overdue Issues</h2>
                <div class="metric bad">${overdue}</div>
                <div class="description">Tasks with late hours > 0.</div>
            </div>

            <div class="card">
                <h2>My Reopen Rate</h2>
                <div class="metric warning">${reopenRate}%</div>
                <div class="description">${reopenCount} of ${totalTasks} tasks reopened.</div>
            </div>

            <div class="card">
                <h2>My Estimate Accuracy</h2>
                <div class="metric good">${accuracy}%</div>
                <div class="description">Estimated: ${totalEstimated}h | Actual: ${totalActual}h</div>
            </div>
        </div>

        <div class="card" style="margin-top:30px;">
            <h2>Estimate Details</h2>
            <table class="report-table" id="reportTable">
                <thead>
                <tr>
                    <th class="sortable" data-col="0" data-type="string" onclick="sortReportTable(this)">Project</th>
                    <th class="sortable" data-col="1" data-type="string" onclick="sortReportTable(this)">Task</th>
                    <th class="col-status sortable" data-col="2" data-type="string" onclick="sortReportTable(this)">Status</th>
                    <th class="col-number sortable" data-col="3" data-type="number" onclick="sortReportTable(this)">Late (h)</th>
                    <th class="col-number sortable" data-col="4" data-type="number" onclick="sortReportTable(this)">Est. (h)</th>
                    <th class="col-number sortable" data-col="5" data-type="number" onclick="sortReportTable(this)">Act. (h)</th>
                    <th class="col-status sortable" data-col="6" data-type="string" onclick="sortReportTable(this)">Reopen</th>
                </tr>
                </thead>
                <tbody>
                ${tableRows}
                </tbody>
                <tfoot>
                <tr>
                    <td colspan="3" style="text-align:right; font-weight:700;">Total</td>
                    <td class="col-number" style="font-weight:700;">${totalLateHrs}</td>
                    <td class="col-number" style="font-weight:700;">${totalEstimated}</td>
                    <td class="col-number" style="font-weight:700;">${totalActual}</td>
                    <td></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    `;
}

function exportPDF() {
    generateReport();
    setTimeout(() => {
        const element = document.getElementById('pdfContent');
        const name = document.getElementById('reporterName').value.trim();
        const dateVal = document.getElementById('reportDate').value;

        html2pdf().set(opt).from(element).save().then(() => {

}

function importFile() {
    const fileInput = document.getElementById('importFile');
    const file = fileInput.files[0];
    if (!file) return alert('Please select a file.');

    const reader = new FileReader();
    const isCSV = file.name.toLowerCase().endsWith('.csv');

    reader.onload = function(e) {
        let rows;
        if (isCSV) {
            rows = parseCSV(e.target.result);
        } else {
            const workbook = XLSX.read(e.target.result, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            rows = XLSX.utils.sheet_to_json(sheet);
        }
        processImportedData(rows);
    };

    if (isCSV) {
        reader.readAsText(file);
    } else {
        reader.readAsArrayBuffer(file);
    }
}

function parseCSV(text) {
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) return [];

    const headers = parseCSVLine(lines[0]);
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
        const values = parseCSVLine(lines[i]);
        const obj = {};
        headers.forEach((h, idx) => obj[h.trim()] = (values[idx] || '').trim());
        rows.push(obj);
    }
    return rows;
}

function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
            if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
            else if (ch === '"') { inQuotes = false; }
            else { current += ch; }
        } else {
            if (ch === '"') { inQuotes = true; }
            else if (ch === ',') { result.push(current); current = ''; }
            else { current += ch; }
        }
    }
    result.push(current);
    return result;
}

function processImportedData(rows) {
    const completedStatuses = ['closed', 'resolved', 'release ready', 'done'];
    const grouped = {};

    rows.forEach(row => {
        const key = row['Issue Key'] || '';
        if (!key) return;

        if (!grouped[key]) {
            grouped[key] = {
                project: row['Project Name'] || row['Project Key'] || '',
                task: row['Issue summary'] || '',
                status: row['Issue Status'] || '',
                lateHrs: 0,
                est: parseFloat(row['Issue Original Estimate']) || 0,
                act: 0,
                reopen: false,
                lastDate: row['Work date'] || ''
            };
        }

        const entry = grouped[key];
        entry.act += parseFloat(row['Hours']) || 0;

        // Take status from the latest record
        const workDate = row['Work date'] || '';
        if (workDate >= entry.lastDate) {
            entry.lastDate = workDate;
            entry.status = row['Issue Status'] || entry.status;
        }
    });

    // Clear existing rows
    const tbody = document.getElementById('inputTableBody');
    tbody.innerHTML = '';

    // Add imported rows
    Object.keys(grouped).forEach(key => {
        const g = grouped[key];
        const statusNorm = g.status.toLowerCase().trim();
        const mappedStatus = completedStatuses.includes(statusNorm) ? 'Completed' : 'In Progress';
        addRow(g.project, `[${key}] ${g.task}`, mappedStatus, g.lateHrs, g.est, g.act, g.reopen);
    });
}

function exportExcel() {
    const name = document.getElementById('reporterName').value.trim() || 'N/A';
    const position = document.getElementById('reporterPosition').value.trim() || 'N/A';
    const dateVal = document.getElementById('reportDate').value;
    const reportDateDisplay = dateVal
        ? new Date(dateVal).toLocaleDateString('en-GB')
        : new Date().toLocaleDateString('en-GB');

    const rows = document.querySelectorAll('#inputTableBody tr');
    let totalEstimated = 0, totalActual = 0, totalTasks = 0;
    let completed = 0, overdue = 0, reopenCount = 0;
    const details = [];

    rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const select = row.querySelector('select');
        const project = inputs[0].value;
        const task = inputs[1].value;
        const status = select.value;
        const lateHrs = parseFloat(inputs[2].value) || 0;
        const est = parseFloat(inputs[3].value) || 0;
        const act = parseFloat(inputs[4].value) || 0;
        const isReopen = inputs[5].checked;

        if(task.trim() !== '') {
            totalTasks++;
            if(status === 'Completed') completed++;
            if(lateHrs > 0) overdue++;
            if(isReopen) reopenCount++;
            totalEstimated += est;
            totalActual += act;
            details.push({ Project: project, Task: task, Status: status, 'Late (h)': lateHrs, 'Est. (h)': est, 'Act. (h)': act, Reopen: isReopen ? 'Yes' : 'No' });
        }
    });

    const reopenRate = totalTasks > 0 ? ((reopenCount / totalTasks) * 100).toFixed(0) : 0;
    const accuracy = totalEstimated > 0 ? (100 - (Math.abs(totalActual - totalEstimated)/totalEstimated*100)).toFixed(0) : 0;

    // Sheet 1: Summary
    const summaryData = [
        ['Performance Report'],
        ['Name', name],
        ['Position', position],
        ['Report Date', reportDateDisplay],
        [],
        ['Metric', 'Value'],
        ['Completed Issues', completed + ' / ' + totalTasks],
        ['Overdue Issues', overdue],
        ['Reopen Rate', reopenRate + '%'],
        ['Estimate Accuracy', accuracy + '%'],
        ['Total Estimated (h)', totalEstimated],
        ['Total Actual (h)', totalActual]
    ];
    const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
    ws1['!cols'] = [{ wch: 20 }, { wch: 20 }];

    // Sheet 2: Details
    const ws2 = XLSX.utils.json_to_sheet(details);
    ws2['!cols'] = [{ wch: 15 }, { wch: 30 }, { wch: 12 }, { wch: 8 }, { wch: 8 }, { wch: 8 }, { wch: 8 }];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws1, 'Summary');
    XLSX.utils.book_append_sheet(wb, ws2, 'Details');

    const dateStr = dateVal ? dateVal.replace(/-/g, '') : 'undated';
    const nameStr = name !== 'N/A' ? name.replace(/\s+/g, '_') : 'Report';
    XLSX.writeFile(wb, `${nameStr}_Performance_${dateStr}.xlsx`);
}

function sortReportTable(th) {
    const table = document.getElementById('reportTable');
    const colIdx = parseInt(th.dataset.col);
    const type = th.dataset.type;
    const isAsc = th.classList.contains('asc');

    table.querySelectorAll('th.sortable').forEach(h => h.classList.remove('asc', 'desc'));
    th.classList.add(isAsc ? 'desc' : 'asc');
    const dir = isAsc ? -1 : 1;

    const tbody = table.tBodies[0] || table;
    const rows = Array.from(tbody.querySelectorAll('tr'));

    rows.sort((a, b) => {
        const aVal = a.cells[colIdx].textContent.trim();
        const bVal = b.cells[colIdx].textContent.trim();
        if (type === 'number') {
            return (parseFloat(aVal) - parseFloat(bVal)) * dir;
        }
        return aVal.localeCompare(bVal, 'vi') * dir;
    });

    rows.forEach(row => tbody.appendChild(row));
}

function sortInputTable(th) {
    const colIdx = parseInt(th.dataset.col);
    const type = th.dataset.type;
    const isAsc = th.classList.contains('asc');

    document.querySelectorAll('#inputTable th.sortable').forEach(h => h.classList.remove('asc', 'desc'));
    th.classList.add(isAsc ? 'desc' : 'asc');
    const dir = isAsc ? -1 : 1;

    const tbody = document.getElementById('inputTableBody');
    const rows = Array.from(tbody.rows);

    rows.sort((a, b) => {
        let aVal, bVal;
        if (colIdx <= 1) {
            // text input
            aVal = a.cells[colIdx].querySelector('input').value.trim();
            bVal = b.cells[colIdx].querySelector('input').value.trim();
        } else if (colIdx === 2) {
            // select
            aVal = a.cells[colIdx].querySelector('select').value;
            bVal = b.cells[colIdx].querySelector('select').value;
        } else {
            // number input
            aVal = a.cells[colIdx].querySelector('input').value;
            bVal = b.cells[colIdx].querySelector('input').value;
        }

        if (type === 'number') {
            return ((parseFloat(aVal) || 0) - (parseFloat(bVal) || 0)) * dir;
        }
        return aVal.localeCompare(bVal, 'vi') * dir;
    });

    rows.forEach(row => tbody.appendChild(row));
}
